# 102_summarize_messages.yaml
title: Summarize messages
note: |
  - summarize messages into text under 4k char. using 'user_input' model
  - `user_input_0`:
    - `gemma2-9b-it`
    - `llama-3.1-8b-instant`
    - `meta-llama/llama-4-scout-17b-16e-instruct`
    - `openai/gpt-oss-20b`
    - `openai/gpt-oss-120b`
single_config:
  header_df:
  - Property: Content-Type
    Value: application/json
  - Property: Authorization
    Value: Bearer ＜API_KEY＞
  method: POST
  req_body:
    # model: "llama-3.3-70b-versatile"
    # model: "meta-llama/llama-4-scout-17b-16e-instruct"
    model: "＜user_input_0＞"
    messages:
      - role: "system"
        content: "userおよびassistantのメッセージを4,000以内に要約して下さい。
          ## 要件：
          - 01. メッセージの情報は維持するように努めて下さい
          - 02. 特別なキーワード・専門用語は原文のワードを使って下さい
          - 03. 目標の文字数以内に収まる場合は原文を整形するにとどめて下さい
          "
  uri: https://api.groq.com/openai/v1/chat/completions
  use_dynamic_inputs: true
  user_property_path: choices[0].message.content
